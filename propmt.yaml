instrucciones:
  tarea: "Analizar las fuentes y extraer las ideas principales sobre el tema de la libertad."
  entregable: "Generar un guion detallado para 20 diapositivas. Para cada diapositiva debes incluir: el texto visible en pantalla, la descripcion de la imagen sugerida y el texto exacto que el orador leera (calculado para durar exactamente 20 segundos a ritmo normal)."

configuracion_presentacion:
  formato: PechaKucha
  modelo: "20x20"
  tema_central: "El concepto de libertad en la fuente aportada"

restricciones_temporales:
  total_diapositivas: 20
  segundos_por_diapositiva: 20
  tiempo_total_segundos: 400
  tiempo_total_minutos: "6:40"
  comportamiento_transicion: "Automatica e inflexible"

directrices_diseno_y_contenido:
  reglas_de_texto_en_pantalla:
    permitir_parrafos: false
    permitir_viñetas: false
    limite_texto: "Maximo un titulo corto o una frase conceptual por diapositiva"
  reglas_visuales:
    tipo_imagen: "Conceptuales, de gran tamaño"
    funcion_imagen: "Soporte visual inmediato relacionado con las ideas de libertad discutidas"

estructura_del_guion:
  distribucion_bloques:
    apertura:
      diapositiva: 1
      contenido: "Presentacion del problema o definicion de libertad segun el autor de la fuente."
    desarrollo:
      diapositivas: "2 a 19"
      estrategia: "Dividir el analisis de la libertad en bloques tematicos progresivos, manteniendo el avance narrativo sin estancarse en una sola idea."
    cierre:
      diapositiva: 20
      contenido: "Sintesis final sobre la vision de la libertad en el texto."

instrucciones_redaccion_orador:
  tono: "Directo, academico pero accesible"
  estilo: "Frases claras, densidad de informacion alta. Eliminar introducciones vacias."
  metrica_de_lectura: "Aproximadamente 45 a 50 palabras por diapositiva para encajar en la ventana de 20 segundos."
