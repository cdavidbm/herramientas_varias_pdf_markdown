# Sitio estático: la presentación es un único index.html en la raíz.
# No requiere paso de build.
[build]
  publish = "."
  command = ""

# El sitio es de una sola página; redirige cualquier ruta a index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
