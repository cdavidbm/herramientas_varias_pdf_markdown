<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Paraíso Perdido · La libertad — Presentación PechaKucha</title>
<style>
  :root{
    --bg:#06060c;
    --ink:#f3ead6;
    --ink-soft:#c9bfa6;
    --gold:#e8c061;
    --gold-soft:#b89238;
    --accent:#e8c061;
    --accent2:#7aa2ff;
    --panel:rgba(18,16,28,.55);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --sans:"Helvetica Neue",Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--serif);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Animated background ---------- */
  #bgCanvas{position:fixed;inset:0;z-index:0;display:block}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 30%,transparent 40%,rgba(0,0,0,.55) 100%);}

  /* ---------- Stage ---------- */
  #stage{position:fixed;inset:0;z-index:2;display:flex;align-items:center;justify-content:center}

  .slide{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    opacity:0;visibility:hidden;
    transition:opacity .8s ease;
    padding:clamp(20px,4vw,70px);
  }
  .slide.active{opacity:1;visibility:visible}

  .slide-inner{
    width:min(1180px,94vw);
    max-height:88vh;
    display:grid;
    grid-template-columns:1.35fr .9fr;
    gap:clamp(20px,4vw,60px);
    align-items:center;
  }
  .slide.solo .slide-inner{grid-template-columns:1fr;text-align:center;max-width:900px}

  /* entrance animation pieces */
  .reveal{opacity:0;transform:translateY(26px);}
  .slide.active .reveal{
    animation:rise .9s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .slide.active .reveal.d1{animation-delay:.15s}
  .slide.active .reveal.d2{animation-delay:.35s}
  .slide.active .reveal.d3{animation-delay:.6s}
  .slide.active .reveal.d4{animation-delay:.85s}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}

  .phase{
    font-family:var(--sans);
    letter-spacing:.42em;text-transform:uppercase;
    font-size:.66rem;color:var(--accent);
    margin-bottom:18px;opacity:.85;
  }
  .phase .num{color:var(--ink-soft);letter-spacing:.2em;margin-left:.6em}

  h1.title{
    font-size:clamp(2.1rem,5.4vw,4.1rem);
    line-height:1.04;font-weight:600;
    letter-spacing:.5px;
    background:linear-gradient(180deg,#fff7e6,var(--accent) 70%,var(--gold-soft));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 2px 30px rgba(232,192,97,.18);
    margin-bottom:.5em;
  }

  .lead{
    font-size:clamp(1rem,1.7vw,1.32rem);
    line-height:1.6;color:var(--ink);
    margin-bottom:1.1em;max-width:42em;
  }

  blockquote{
    border-left:2px solid var(--accent);
    padding:.2em 0 .2em 1.1em;
    margin:0 0 1.1em 0;
    font-style:italic;color:var(--ink-soft);
    font-size:clamp(.95rem,1.5vw,1.18rem);line-height:1.5;
  }
  blockquote cite{display:block;font-style:normal;font-family:var(--sans);
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold-soft);margin-top:.6em;}

  .narration{
    position:relative;
    background:var(--panel);
    border:1px solid rgba(232,192,97,.22);
    border-radius:14px;
    padding:1.05em 1.25em 1.05em 1.35em;
    backdrop-filter:blur(6px);
    font-size:clamp(.92rem,1.45vw,1.12rem);
    line-height:1.62;color:var(--ink);
    max-width:46em;
  }
  .narration::before{
    content:"";
    position:absolute;top:-1px;left:18px;width:30px;height:2px;
    background:var(--accent);opacity:.7;
  }

  /* ---------- Visual motif ---------- */
  .visual{display:flex;align-items:center;justify-content:center;height:100%}
  .motif{width:min(360px,34vw);height:min(360px,34vw);color:var(--accent);
    filter:drop-shadow(0 0 26px rgba(232,192,97,.32));}
  .slide.solo .visual{display:none}
  .motif .stroke{fill:none;stroke:currentColor;stroke-width:3;
    stroke-linecap:round;stroke-linejoin:round;}
  .motif .fillc{fill:currentColor}
  .motif .dim{opacity:.4}
  .slide.active .motif{animation:float 7s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .slide.active .draw{stroke-dasharray:1400;stroke-dashoffset:1400;
    animation:draw 2.4s ease forwards .3s}
  @keyframes draw{to{stroke-dashoffset:0}}

  /* image suggestion (hidden by default, toggle with O) */
  .imgnote{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:88px;z-index:6;
    max-width:760px;width:90vw;
    background:rgba(8,8,16,.92);border:1px solid rgba(122,162,255,.3);
    border-radius:10px;padding:.8em 1.1em;
    font-family:var(--sans);font-size:.82rem;color:var(--ink-soft);
    line-height:1.45;display:none;
  }
  .imgnote.show{display:block;animation:rise .4s ease}
  .imgnote b{color:var(--accent2);font-weight:600;letter-spacing:.1em;
    font-size:.66rem;text-transform:uppercase;display:block;margin-bottom:.3em}

  /* ---------- Top progress + timer ---------- */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:5;height:4px;
    background:rgba(255,255,255,.06)}
  #topfill{height:100%;width:0;background:linear-gradient(90deg,var(--gold-soft),var(--accent));
    transition:width .4s ease}
  #ring{position:fixed;top:16px;right:18px;z-index:6;width:46px;height:46px;
    opacity:0;transition:opacity .3s}
  #ring.on{opacity:1}
  #ring circle{fill:none;stroke-width:4}
  #ring .track{stroke:rgba(255,255,255,.12)}
  #ring .prog{stroke:var(--accent);stroke-linecap:round;
    transform:rotate(-90deg);transform-origin:center;}
  #ring .t{font-family:var(--sans);font-size:13px;fill:var(--ink);text-anchor:middle}

  /* ---------- Controls ---------- */
  #controls{position:fixed;bottom:0;left:0;right:0;z-index:6;
    display:flex;align-items:center;justify-content:center;gap:10px;
    padding:14px;background:linear-gradient(0deg,rgba(0,0,0,.6),transparent);}
  .btn{
    font-family:var(--sans);font-size:.78rem;letter-spacing:.05em;
    color:var(--ink);background:rgba(255,255,255,.06);
    border:1px solid rgba(232,192,97,.28);border-radius:999px;
    padding:.5em .95em;cursor:pointer;transition:.2s;user-select:none;
    display:inline-flex;align-items:center;gap:.45em;
  }
  .btn:hover{background:rgba(232,192,97,.16);border-color:var(--accent);color:#fff}
  .btn.primary{background:var(--accent);color:#1a1304;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:#f4cf78}
  #counter{font-family:var(--sans);font-size:.8rem;color:var(--ink-soft);
    min-width:72px;text-align:center;letter-spacing:.08em}

  /* dots */
  #dots{position:fixed;left:50%;transform:translateX(-50%);bottom:60px;z-index:5;
    display:flex;gap:7px;flex-wrap:wrap;justify-content:center;max-width:80vw}
  #dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);
    cursor:pointer;transition:.25s}
  #dots span.on{background:var(--accent);transform:scale(1.35);
    box-shadow:0 0 10px var(--accent)}

  /* overview grid */
  #overview{position:fixed;inset:0;z-index:8;background:rgba(4,4,10,.97);
    display:none;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:14px;padding:48px;overflow:auto}
  #overview.show{display:grid}
  .ov-card{border:1px solid rgba(232,192,97,.22);border-radius:10px;padding:14px;
    cursor:pointer;background:rgba(20,18,30,.6);transition:.2s;min-height:120px}
  .ov-card:hover{border-color:var(--accent);transform:translateY(-3px);
    box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .ov-card .n{font-family:var(--sans);font-size:.62rem;letter-spacing:.2em;
    color:var(--accent);margin-bottom:8px}
  .ov-card .t{font-size:1.02rem;line-height:1.2;color:var(--ink)}

  /* help / hint */
  #hint{position:fixed;bottom:14px;left:16px;z-index:5;font-family:var(--sans);
    font-size:.68rem;color:rgba(255,255,255,.32);letter-spacing:.04em;line-height:1.5}
  kbd{background:rgba(255,255,255,.1);border-radius:4px;padding:1px 5px;
    font-family:var(--sans);font-size:.66rem;border:1px solid rgba(255,255,255,.14)}

  /* title slide flourish */
  .deck-meta{font-family:var(--sans);font-size:.74rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--ink-soft);margin-top:1.4em;opacity:.8}

  @media (max-width:820px){
    .slide-inner{grid-template-columns:1fr;text-align:left}
    .visual{display:none}
    #dots{display:none}
  }
</style>
</head>
<body>
  <canvas id="bgCanvas"></canvas>
  <div class="vignette"></div>

  <div id="topbar"><div id="topfill"></div></div>

  <svg id="ring" viewBox="0 0 46 46">
    <circle class="track" cx="23" cy="23" r="19"></circle>

  </svg>

  <div id="stage"></div>

  <div class="imgnote" id="imgnote"></div>

  <div id="dots"></div>

  <div id="controls">
    <button class="btn" id="prev">‹ Anterior</button>
    <button class="btn primary" id="play">▶ Auto 20s</button>
    <div id="counter">01 / 20</div>

    <button class="btn" id="ovBtn">▦ Índice</button>

  </div>

  <div id="overview"></div>

  <div id="hint">
    <kbd>←</kbd><kbd>→</kbd> navegar · <kbd>espacio</kbd> auto · <kbd>O</kbd> índice · <kbd>I</kbd> imagen · <kbd>F</kbd> pantalla completa
  </div>

/* ============================================================
   Render
   ============================================================ */
const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');
const overview = document.getElementById('overview');
let current = 0;
let auto = false;
let timer = null, raf = null, startTime = 0;
const DURATION = 20000; // PechaKucha: 20s

SLIDES.forEach((s,i)=>{
  const solo = (s.phase==="Apertura"||s.phase==="Cierre");
  const el = document.createElement('section');
  el.className = 'slide' + (solo?' solo':'');
  el.dataset.theme = s.theme;
  el.innerHTML = `
    <div class="slide-inner">
      <div class="text">
        <div class="phase reveal d1">${s.phase}<span class="num">${String(i+1).padStart(2,'0')} / 20</span></div>
        <h1 class="title reveal d1">${s.title}</h1>
        <p class="lead reveal d2">${s.lead}</p>
        <blockquote class="reveal d3">«${s.quote}»<cite>${s.cite}</cite></blockquote>
        <div class="narration reveal d4">${s.narration}</div>
      </div>
      <div class="visual reveal d2"><svg class="motif" viewBox="0 0 100 100">${MOTIFS[s.motif]||MOTIFS.flame}</svg></div>
    </div>`;
  stage.appendChild(el);

  const dot = document.createElement('span');
  dot.title = s.title;
  dot.onclick = ()=>go(i);
  dotsEl.appendChild(dot);

  const card = document.createElement('div');
  card.className='ov-card';
  card.innerHTML = `<div class="n">${s.phase} · ${String(i+1).padStart(2,'0')}</div><div class="t">${s.title}</div>`;
  card.onclick = ()=>{ go(i); toggleOverview(false); };
  overview.appendChild(card);
});

const slidesEls = [...document.querySelectorAll('.slide')];
const dotEls = [...dotsEl.children];

function countWords(t){ return t.trim().split(/\s+/).length; }

/* theme accent map */
const THEME = {
  gold:{a:'#e8c061',a2:'#b89238', bg:['#1a1206','#06060c']},
  fire:{a:'#ff7a3c',a2:'#c43a1e', bg:['#2a0c08','#08040a']},
  blue:{a:'#8fb4ff',a2:'#3a5fce', bg:['#0a1228','#05060f']},
  green:{a:'#7fd6a0',a2:'#2e8b57', bg:['#08200f','#04080a']}
};

function applyTheme(t){
  const c = THEME[t]||THEME.gold;
  document.documentElement.style.setProperty('--accent',c.a);
  document.documentElement.style.setProperty('--accent2',c.a2);
  bgColors = c.bg;
}

/* ============================================================
   Navigation
   ============================================================ */
function go(i, dir){
  if(i<0||i>=SLIDES.length) return;
  slidesEls[current].classList.remove('active');
  // restart reveal animations
  current = i;
  const el = slidesEls[current];
  // force reflow to replay CSS animations
  el.querySelectorAll('.reveal').forEach(n=>{ n.style.animation='none'; void n.offsetWidth; n.style.animation=''; });
  el.classList.add('active');
  applyTheme(SLIDES[i].theme);
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
  document.getElementById('counter').textContent = String(i+1).padStart(2,'0')+' / 20';
  document.getElementById('topfill').style.width = ((i+1)/SLIDES.length*100)+'%';
  updateImgNote();
  if(auto) restartTimer();
}
function next(){ go(current+1); }
function prev(){ go(current-1); }

/* ============================================================
   Auto-advance (PechaKucha 20s) with countdown ring
   ============================================================ */
const ring = document.getElementById('ring');
const ringProg = ring.querySelector('.prog');
const ringT = document.getElementById('ringT');
const R = 19, CIRC = 2*Math.PI*R;
ringProg.style.strokeDasharray = CIRC;

function setAuto(on){
  auto = on;
  document.getElementById('play').innerHTML = on ? '❚❚ Pausar' : '▶ Auto 20s';
  document.getElementById('play').classList.toggle('primary', !on);
  ring.classList.toggle('on', on);
  if(on) restartTimer(); else stopTimer();
}
function restartTimer(){
  stopTimer();
  startTime = performance.now();
  tick();
  timer = setTimeout(()=>{
    if(current < SLIDES.length-1) next();
    else setAuto(false);
  }, DURATION);
}
function tick(){
  const elapsed = performance.now() - startTime;
  const remain = Math.max(0, DURATION - elapsed);
  const frac = remain/DURATION;
  ringProg.style.strokeDashoffset = CIRC*(1-frac);
  ringT.textContent = Math.ceil(remain/1000);
  if(auto) raf = requestAnimationFrame(tick);
}
function stopTimer(){ clearTimeout(timer); cancelAnimationFrame(raf); }

/* ============================================================
   Image suggestion overlay
   ============================================================ */
const imgnote = document.getElementById('imgnote');
let imgVisible = false;
function updateImgNote(){
  imgnote.innerHTML = `<b>Imagen sugerida · Diapositiva ${current+1}</b>${IMAGES[current]}`;
}
function toggleImg(force){
  imgVisible = (force!==undefined)?force:!imgVisible;
  imgnote.classList.toggle('show', imgVisible);
}

/* overview */
function toggleOverview(force){
  const show = (force!==undefined)?force:!overview.classList.contains('show');
  overview.classList.toggle('show', show);
}

/* ============================================================
   Controls + keyboard
   ============================================================ */
document.getElementById('next').onclick = ()=>{ next(); };
document.getElementById('prev').onclick = ()=>{ prev(); };
document.getElementById('play').onclick = ()=> setAuto(!auto);
document.getElementById('imgBtn').onclick = ()=> toggleImg();
document.getElementById('ovBtn').onclick = ()=> toggleOverview();
document.getElementById('fsBtn').onclick = ()=>{
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
};

document.addEventListener('keydown', e=>{
  switch(e.key){
    case 'ArrowRight': case 'PageDown': next(); break;
    case 'ArrowLeft':  case 'PageUp':   prev(); break;
    case ' ': e.preventDefault(); setAuto(!auto); break;
    case 'Home': go(0); break;
    case 'End': go(SLIDES.length-1); break;
    case 'o': case 'O': toggleOverview(); break;
    case 'i': case 'I': toggleImg(); break;
    case 'f': case 'F':
      if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
      break;
    case 'Escape': toggleOverview(false); toggleImg(false); break;
  }
});

/* click on stage advances (ignore clicks on controls) */
stage.addEventListener('click', e=>{
  const x = e.clientX / window.innerWidth;
  if(x < 0.25) prev(); else if(x > 0.4) next();
});

/* ============================================================
   Background: drifting embers / stars on canvas
   ============================================================ */
const cv = document.getElementById('bgCanvas');
const ctx = cv.getContext('2d');
let W,H,particles=[];
let bgColors = THEME.gold.bg;

function resize(){
  W = cv.width = innerWidth; H = cv.height = innerHeight;
}
addEventListener('resize', resize); resize();

function hexToRgb(h){const n=parseInt(h.slice(1),16);return[n>>16,(n>>8)&255,n&255];}

function makeParticles(){
  particles = [];
  const n = Math.min(120, Math.floor(W*H/14000));
  for(let i=0;i<n;i++){
    particles.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.8+0.4,
      vy:-(Math.random()*0.4+0.08),
      vx:(Math.random()-0.5)*0.2,
      a:Math.random()*0.6+0.15,
      tw:Math.random()*Math.PI*2
    });
  }
}
makeParticles();

function draw(t){
  // background gradient
  const g = ctx.createRadialGradient(W*0.5,H*0.35,0,W*0.5,H*0.35,Math.max(W,H)*0.9);
  g.addColorStop(0,bgColors[0]); g.addColorStop(1,bgColors[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  const acc = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#e8c061';
  const [r,gc,b] = hexToRgb(acc.length===4?('#'+acc[1]+acc[1]+acc[2]+acc[2]+acc[3]+acc[3]):acc);

  for(const p of particles){
    p.y += p.vy; p.x += p.vx; p.tw += 0.02;
    if(p.y < -5){ p.y = H+5; p.x = Math.random()*W; }
    if(p.x < -5) p.x = W+5; if(p.x>W+5) p.x=-5;
    const alpha = p.a * (0.6+0.4*Math.sin(p.tw));
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(${r},${gc},${b},${alpha})`;
    ctx.shadowBlur = 8; ctx.shadowColor = `rgba(${r},${gc},${b},${alpha})`;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ---------- start ---------- */
applyTheme(SLIDES[0].theme);
go(0);
</script>
